<!doctype html>
<html lang="en">
  <head>
    <title>Reset Password</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="/web/css/app.css" rel="stylesheet" />
  </head>
  <body>
    <h1>Reset Password</h1>
    <main>
      <p>A token is required to reset the password. Invalid URL.</p>
    </main>

    <script>
      (() => {
        let url = new URL(location.href);
        // TrailBase emails use `password_reset_code`; accept legacy `?token=`
        // for backward compat with old reset emails still in inboxes.
        let token =
          url.searchParams.get("password_reset_code") ||
          url.searchParams.get("token");
        if (!token) return;
        document.querySelector("main").innerHTML = `
<form method="post" action="/api/auth/v1/reset_password/update">
    <input type=hidden name=password_reset_code value="${token}">
    <div>
        <label for="password">New Password</label>
        <input type="password" name="password" id="password" required>
    </div>
    <div>
        <label for="password_repeat">Confirm New Password</label>
        <input type="password" name="password_repeat" id="password_repeat" required>
    </div>
    <button type="submit">Reset Password</button>
</form>`;
      })();
    </script>

    <script src="/js/app.js"></script>
  </body>
</html>
